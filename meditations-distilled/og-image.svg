<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <rect width="1200" height="1200" fill="#f0eee6"/>

  <!-- Everything centered vertically in the middle 630px band (285 to 915) -->

  <!-- Circles -->
  <circle cx="185" cy="510" r="130" fill="none" stroke="#4a4740" stroke-width="3"/>
  <circle cx="215" cy="650" r="130" fill="none" stroke="#4a4740" stroke-width="3"/>

  <!-- Kicker -->
  <text x="420" y="460" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-weight="600" font-size="12" letter-spacing="2.5" fill="rgba(29,27,24,0.65)">A CONTEMPORARY GUIDE THROUGH STOICISM</text>

  <!-- Title -->
  <text x="420" y="535" font-family="Georgia, Times New Roman, serif" font-weight="400" font-size="52" letter-spacing="6" fill="rgba(20,20,20,0.96)">MEDITATIONS</text>
  <text x="420" y="595" font-family="Georgia, Times New Roman, serif" font-weight="400" font-size="52" letter-spacing="6" fill="rgba(20,20,20,0.96)">DISTILLED</text>

  <!-- Subtitle -->
  <text x="420" y="645" font-family="Georgia, Times New Roman, serif" font-style="italic" font-size="22" fill="rgba(36,33,29,0.9)">The Timeless Art of Inner Command</text>

  <!-- Credit -->
  <text x="420" y="710" font-family="Georgia, Times New Roman, serif" font-size="16" fill="rgba(41,37,33,0.6)">Based on Marcus Aurelius</text>
  <text x="420" y="734" font-family="Georgia, Times New Roman, serif" font-size="16" fill="rgba(41,37,33,0.6)">Adapted by Alexis Papageorgiou</text>
</svg>
